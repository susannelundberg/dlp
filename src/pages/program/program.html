<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="program.css">
    <title>Disneyland</title>
</head>

<body>
    <header></header>
    <main>
        <h1>PROGRAM</h1>
        <h2 class="h2">Create your own travel program</h2>
        <form class="dag-form">
            <div class="form-controls">
                <input required type="text" name="dag" id="dag" />
                <label for="dag">Day</label>
            </div>
            <button class="btn btn-rounded">Add day</button>
        </form>
        <form class="schema-form">
            <div class="form-controls">
                <select name="dag" id="dag-val" required></select>
                <label for="dag">Day</label>
            </div>
            <div class="form-controls">
                <input required type="text" name="tid" id="tid" />
                <label for="tid">Time</label>
            </div>
            <div class="form-controls">
                <input required type="text" name="beskrivning" id="beskrivning" />
                <label for="beskrivning">Activity</label>
            </div>
            <button class="btn btn-rounded">Add</button>
        </form>
        <div class="schema-container"></div>
    </main>
    <script type="module" src="program.js"></script>
</body>

</html>
